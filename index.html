      <style>
        body { margin: 0; background-color: #FFF8E1; }
        .pwa-splash-screen {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background-color: #FFF8E1;
          font-family: 'Mukta', 'Inter', system-ui, sans-serif;
          color: #FF9933;
        }
        .loading-spinner {
          width: 50px;
          height: 50px;
          border: 5px solid rgba(255, 153, 51, 0.3);
          border-radius: 50%;
          border-top-color: #FF9933;
          margin-bottom: 24px;
          animation: spin 1s ease-in-out infinite;
        }
        .pwa-splash-title {

          letter-spacing: 0.5px;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        @media (prefers-color-scheme: dark) {
          body, .pwa-splash-screen { background-color: #1A1A1A; color: #D4AF37; }
